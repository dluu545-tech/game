<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizPro v2 - Hệ thống thi chuyên nghiệp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        :root { --primary: #6E41E2; --secondary: #2D31FA; --accent: #FFD700; }
        body { font-family: 'Outfit', sans-serif; background-color: #F0F2F5; }
        .canva-card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .gradient-btn { background: linear-gradient(135deg, #6E41E2 0%, #2D31FA 100%); color: white; transition: all 0.3s; }
        .gradient-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(110, 65, 226, 0.4); }
        .nav-tab.active { background-color: #6E41E2; color: white; box-shadow: 0 4px 10px rgba(110, 65, 226, 0.3); }
        .option-btn.selected { border-color: #6E41E2; background-color: #F5F3FF; transform: scale(1.02); }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-50 px-6 py-4 flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 gradient-btn rounded-xl flex items-center justify-center text-xl shadow-lg">
                <i class="fas fa-brain"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tight">Quiz<span class="text-indigo-600">Pro</span></h1>
        </div>
        
        <div class="flex bg-slate-100 p-1 rounded-xl">
            <button onclick="changeView('student')" id="tab-student" class="nav-tab active px-5 py-2 rounded-lg text-sm font-bold transition-all">Học sinh</button>
            <button onclick="changeView('teacher')" id="tab-teacher" class="nav-tab px-5 py-2 rounded-lg text-sm font-bold transition-all text-slate-500">Giáo viên</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">

        <!-- GIAO DIỆN GIÁO VIÊN -->
        <div id="teacherView" class="hidden space-y-6">
            <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                <h2 class="text-3xl font-black">Bảng điều khiển</h2>
                <div class="flex gap-2">
                    <button onclick="switchTeacherTab('quiz')" class="bg-white px-4 py-2 rounded-xl border border-slate-200 font-bold hover:bg-slate-50 transition-all shadow-sm"><i class="fas fa-edit mr-2 text-indigo-500"></i>Đề thi</button>
                    <button onclick="switchTeacherTab('students')" class="bg-white px-4 py-2 rounded-xl border border-slate-200 font-bold hover:bg-slate-50 transition-all shadow-sm"><i class="fas fa-users mr-2 text-green-500"></i>Học sinh</button>
                    <button onclick="switchTeacherTab('results')" class="bg-white px-4 py-2 rounded-xl border border-slate-200 font-bold hover:bg-slate-50 transition-all shadow-sm"><i class="fas fa-chart-line mr-2 text-orange-500"></i>Kết quả</button>
                </div>
            </div>

            <!-- Tab: Đề thi -->
            <div id="t-quiz" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-4">
                    <div class="canva-card p-6">
                        <h3 class="font-black text-lg mb-4 flex items-center gap-2">Tạo câu hỏi mới</h3>
                        <div class="space-y-4">
                            <textarea id="qText" placeholder="Nội dung câu hỏi..." class="w-full p-4 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none"></textarea>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <input type="text" id="opt0" placeholder="Đáp án A" class="p-3 bg-slate-50 rounded-xl border-none outline-none">
                                <input type="text" id="opt1" placeholder="Đáp án B" class="p-3 bg-slate-50 rounded-xl border-none outline-none">
                                <input type="text" id="opt2" placeholder="Đáp án C" class="p-3 bg-slate-50 rounded-xl border-none outline-none">
                                <input type="text" id="opt3" placeholder="Đáp án D" class="p-3 bg-slate-50 rounded-xl border-none outline-none">
                            </div>
                            <div class="flex flex-wrap gap-4 items-center">
                                <select id="correctOpt" class="bg-slate-50 p-3 rounded-xl border-none font-bold text-indigo-600">
                                    <option value="0">Đúng: A</option>
                                    <option value="1">Đúng: B</option>
                                    <option value="2">Đúng: C</option>
                                    <option value="3">Đúng: D</option>
                                    <option value="essay">Tự luận</option>
                                </select>
                                <button onclick="addQuestion()" class="gradient-btn flex-1 py-3 rounded-xl font-bold">LƯU CÂU HỎI</button>
                            </div>
                        </div>
                    </div>
                    <div id="questionsList" class="space-y-3"></div>
                </div>
                <div class="space-y-4">
                    <div class="canva-card p-6 space-y-4">
                        <h3 class="font-black text-lg">Cài đặt phòng</h3>
                        <input type="text" id="roomCode" placeholder="Mã phòng" class="w-full p-3 bg-slate-50 rounded-xl border-none font-bold">
                        <input type="number" id="roomTime" placeholder="Thời gian (phút)" class="w-full p-3 bg-slate-50 rounded-xl border-none font-bold">
                        <button onclick="saveRoomSettings()" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">CẬP NHẬT</button>
                    </div>
                </div>
            </div>

            <!-- Tab: Học sinh -->
            <div id="t-students" class="hidden space-y-6">
                <div class="canva-card p-8 text-center space-y-4 border-2 border-dashed border-slate-200">
                    <div class="text-4xl text-indigo-400"><i class="fas fa-file-excel"></i></div>
                    <h3 class="font-black text-xl">Danh sách học sinh</h3>
                    <p class="text-slate-400 text-sm">Yêu cầu file Excel có cột: <b>Họ tên</b> và <b>Mã HS</b></p>
                    <input type="file" id="excelFile" class="hidden" accept=".xlsx, .xls">
                    <button onclick="document.getElementById('excelFile').click()" class="gradient-btn px-8 py-3 rounded-xl font-bold">TẢI FILE EXCEL</button>
                </div>
                <div id="studentTableContainer" class="canva-card overflow-hidden hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4 text-xs font-black uppercase text-slate-400">STT</th>
                                <th class="p-4 text-xs font-black uppercase text-slate-400">Họ tên</th>
                                <th class="p-4 text-xs font-black uppercase text-slate-400">Mã HS</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Tab: Kết quả -->
            <div id="t-results" class="hidden space-y-4">
                <div class="canva-card overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4 text-xs font-black uppercase text-slate-400">Học sinh</th>
                                <th class="p-4 text-xs font-black uppercase text-slate-400">Điểm</th>
                                <th class="p-4 text-xs font-black uppercase text-slate-400 text-right">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="resultsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- GIAO DIỆN HỌC SINH -->
        <div id="studentView" class="max-w-xl mx-auto space-y-6">
            <div id="st-login" class="canva-card p-10 text-center space-y-8">
                <div class="w-20 h-20 gradient-btn rounded-3xl mx-auto flex items-center justify-center text-3xl shadow-xl">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h2 class="text-3xl font-black">Vào phòng thi</h2>
                <div class="space-y-4 text-left">
                    <div id="stListContainer" class="hidden space-y-2">
                        <label class="text-xs font-black text-slate-400 uppercase">Chọn tên từ danh sách:</label>
                        <select id="stList" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold outline-none"></select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-400 uppercase">Hoặc tự nhập tên:</label>
                        <input type="text" id="stName" placeholder="Họ và tên..." class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold outline-none">
                    </div>
                </div>
                <button onclick="enterExam()" class="w-full gradient-btn py-4 rounded-2xl text-xl font-black">BẮT ĐẦU THI</button>
            </div>

            <div id="st-exam" class="hidden space-y-4">
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
                    <span id="stTimer" class="font-mono text-xl font-black text-indigo-600">00:00</span>
                    <span class="font-bold text-slate-400">Câu <span id="curQIdx">1</span>/<span id="totalQ">0</span></span>
                </div>
                <div class="canva-card p-8 min-h-[300px] space-y-6">
                    <h2 id="qTitle" class="text-xl font-black text-slate-800">---</h2>
                    <div id="choiceContainer" class="grid gap-3"></div>
                    <div id="essayContainer" class="hidden">
                        <textarea id="stEssayAns" placeholder="Nhập câu trả lời tự luận..." class="w-full h-40 p-4 bg-slate-50 rounded-2xl border-none outline-none"></textarea>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button onclick="prevQuestion()" class="bg-white flex-1 py-4 rounded-2xl font-bold">QUAY LẠI</button>
                    <button id="nextBtn" onclick="nextQuestion()" class="gradient-btn flex-1 py-4 rounded-2xl font-bold">TIẾP THEO</button>
                </div>
            </div>

            <div id="st-result" class="hidden canva-card p-12 text-center space-y-6">
                <div class="text-5xl text-green-500"><i class="fas fa-check-circle"></i></div>
                <h2 class="text-3xl font-black">Hoàn thành!</h2>
                <div id="finalScoreDisplay" class="p-6 bg-indigo-50 rounded-3xl border-2 border-indigo-100">
                    <p class="text-6xl font-black text-indigo-600"><span id="stScore">0</span></p>
                    <p class="text-slate-400 font-bold uppercase mt-2">Điểm trắc nghiệm</p>
                </div>
                <button onclick="location.reload()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold">VỀ TRANG CHỦ</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, collection, setDoc, addDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quiz-default';

        let currentUser = null;
        let questions = [];
        let roomSettings = { code: '123456', duration: 15 };
        let studentAnswers = [];
        let curQIdx = 0;
        let timerInterval = null;
        let studentList = [];

        // --- GÁN CÁC HÀM VÀO WINDOW ĐỂ HOẠT ĐỘNG TRONG MODULE ---
        window.changeView = (role) => {
            const tabs = document.querySelectorAll('.nav-tab');
            tabs.forEach(t => {
                t.classList.remove('active');
                t.classList.add('text-slate-500');
            });
            const activeTab = document.getElementById(`tab-${role}`);
            if(activeTab) {
                activeTab.classList.add('active');
                activeTab.classList.remove('text-slate-500');
            }
            document.getElementById('teacherView').classList.toggle('hidden', role !== 'teacher');
            document.getElementById('studentView').classList.toggle('hidden', role !== 'student');
        };

        window.switchTeacherTab = (tab) => {
            ['quiz', 'students', 'results'].forEach(t => {
                const el = document.getElementById(`t-${t}`);
                if(el) el.classList.toggle('hidden', t !== tab);
            });
        };

        window.addQuestion = async () => {
            if(!currentUser) return;
            const text = document.getElementById('qText').value;
            const correct = document.getElementById('correctOpt').value;
            if(!text) return;

            const q = {
                text,
                type: correct === 'essay' ? 'essay' : 'choice',
                correct: correct === 'essay' ? null : parseInt(correct),
                options: [
                    document.getElementById('opt0').value || "A",
                    document.getElementById('opt1').value || "B",
                    document.getElementById('opt2').value || "C",
                    document.getElementById('opt3').value || "D"
                ],
                createdAt: Date.now()
            };
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), q);
            document.getElementById('qText').value = "";
        };

        window.deleteQuestion = async (id) => {
            if(!currentUser) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
        };

        window.saveRoomSettings = async () => {
            if(!currentUser) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'general'), {
                code: document.getElementById('roomCode').value,
                duration: parseInt(document.getElementById('roomTime').value)
            });
            alert("Đã lưu cài đặt!");
        };

        window.selectAnswer = (idx) => {
            studentAnswers[curQIdx].answer = idx;
            renderQuizPage();
        };

        window.nextQuestion = () => {
            if(curQIdx < questions.length - 1) {
                curQIdx++;
                renderQuizPage();
            } else {
                if(confirm("Nộp bài?")) submitQuiz();
            }
        };

        window.prevQuestion = () => { if(curQIdx > 0) { curQIdx--; renderQuizPage(); } };

        window.enterExam = () => {
            const name = document.getElementById('stList').value || document.getElementById('stName').value;
            if(!name) return alert("Vui lòng chọn hoặc nhập tên!");
            if(questions.length === 0) return alert("Chưa có đề thi!");

            document.getElementById('st-login').classList.add('hidden');
            document.getElementById('st-exam').classList.remove('hidden');
            studentAnswers = questions.map(q => ({qid: q.id, answer: q.type === 'essay' ? "" : null}));
            
            let time = roomSettings.duration * 60;
            timerInterval = setInterval(() => {
                time--;
                let m = Math.floor(time / 60);
                let s = time % 60;
                const display = document.getElementById('stTimer');
                if(display) display.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if(time <= 0) submitQuiz();
            }, 1000);
            renderQuizPage();
        };

        // KHỞI TẠO AUTH
        window.onload = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    setupListeners();
                }
            });
        };

        function setupListeners() {
            if (!currentUser) return;

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), (snap) => {
                questions = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.createdAt - b.createdAt);
                renderQuestionsList();
                const totalQ = document.getElementById('totalQ');
                if(totalQ) totalQ.innerText = questions.length;
            });

            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'general'), (snap) => {
                if(snap.exists()) {
                    roomSettings = snap.data();
                    const codeEl = document.getElementById('roomCode');
                    const timeEl = document.getElementById('roomTime');
                    if(codeEl) codeEl.value = roomSettings.code || '123456';
                    if(timeEl) timeEl.value = roomSettings.duration || 15;
                }
            });

            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'students', 'list'), (snap) => {
                if(snap.exists()) {
                    studentList = snap.data().data || [];
                    renderStudentTable();
                    renderStudentDropdown();
                }
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'results'), (snap) => {
                renderResultsTable(snap.docs.map(d => ({id: d.id, ...d.data()})));
            });
        }

        function renderQuestionsList() {
            const list = document.getElementById('questionsList');
            if(!list) return;
            list.innerHTML = questions.map((q, i) => `
                <div class="canva-card p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <span class="font-bold text-indigo-600">#${i+1}</span>
                        <span class="text-sm font-medium">${q.text}</span>
                    </div>
                    <button onclick="deleteQuestion('${q.id}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        const excelFile = document.getElementById('excelFile');
        if(excelFile) {
            excelFile.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, {type:'binary'});
                        const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', 'list'), { data });
                        alert(`Import thành công ${data.length} học sinh!`);
                        e.target.value = "";
                    } catch (err) {
                        alert("Lỗi đọc file Excel.");
                    }
                };
                reader.readAsBinaryString(file);
            });
        }

        function renderStudentTable() {
            const container = document.getElementById('studentTableContainer');
            const tbody = document.getElementById('studentTableBody');
            if(!container || !tbody) return;
            if(studentList.length > 0) {
                container.classList.remove('hidden');
                tbody.innerHTML = studentList.map((s, i) => `
                    <tr class="border-b border-slate-50">
                        <td class="p-4 text-sm font-bold text-slate-400">${i+1}</td>
                        <td class="p-4 text-sm font-bold text-slate-700">${s['Họ tên'] || 'N/A'}</td>
                        <td class="p-4 text-sm text-slate-500">${s['Mã HS'] || 'N/A'}</td>
                    </tr>
                `).join('');
            } else {
                container.classList.add('hidden');
            }
        }

        function renderResultsTable(results) {
            const tbody = document.getElementById('resultsTableBody');
            if(!tbody) return;
            tbody.innerHTML = results.map(r => `
                <tr class="border-b">
                    <td class="p-4 font-bold">${r.studentName}</td>
                    <td class="p-4"><span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">${r.score}/${r.total}</span></td>
                    <td class="p-4 text-right">
                        <button class="text-indigo-500"><i class="fas fa-file-pdf"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function renderStudentDropdown() {
            const sel = document.getElementById('stList');
            const container = document.getElementById('stListContainer');
            if(!sel || !container) return;
            if(studentList.length > 0) {
                container.classList.remove('hidden');
                sel.innerHTML = `<option value="">-- Chọn tên từ danh sách --</option>` + 
                    studentList.map(s => `<option value="${s['Họ tên']}">${s['Họ tên']} - ${s['Mã HS'] || ''}</option>`).join('');
            }
        }

        function renderQuizPage() {
            const q = questions[curQIdx];
            const curEl = document.getElementById('curQIdx');
            const titleEl = document.getElementById('qTitle');
            if(curEl) curEl.innerText = curQIdx + 1;
            if(titleEl) titleEl.innerText = q.text;

            const choices = document.getElementById('choiceContainer');
            const essay = document.getElementById('essayContainer');

            if(q.type === 'choice') {
                choices.classList.remove('hidden');
                essay.classList.add('hidden');
                choices.innerHTML = q.options.map((opt, i) => `
                    <button onclick="selectAnswer(${i})" class="option-btn p-4 rounded-xl border-2 text-left flex items-center gap-3 transition-all ${studentAnswers[curQIdx].answer === i ? 'border-indigo-600 bg-indigo-50 font-bold' : 'border-slate-100'}">
                        <span class="w-8 h-8 rounded-full border flex items-center justify-center text-xs ${studentAnswers[curQIdx].answer === i ? 'bg-indigo-600 text-white' : ''}">${String.fromCharCode(65+i)}</span>
                        ${opt}
                    </button>
                `).join('');
            } else {
                choices.classList.add('hidden');
                essay.classList.remove('hidden');
                const area = document.getElementById('stEssayAns');
                if(area) {
                    area.value = studentAnswers[curQIdx].answer || "";
                    area.oninput = (e) => { studentAnswers[curQIdx].answer = e.target.value; };
                }
            }
            const nextBtn = document.getElementById('nextBtn');
            if(nextBtn) nextBtn.innerText = curQIdx === questions.length - 1 ? "NỘP BÀI" : "TIẾP THEO";
        }

        async function submitQuiz() {
            if(!currentUser) return;
            clearInterval(timerInterval);
            let score = 0;
            let total = 0;
            questions.forEach((q, i) => {
                if(q.type === 'choice') {
                    total++;
                    if(studentAnswers[i].answer === q.correct) score++;
                }
            });

            const result = {
                studentName: document.getElementById('stList').value || document.getElementById('stName').value,
                score,
                total,
                answers: studentAnswers,
                timestamp: Date.now()
            };
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'results'), result);
            document.getElementById('st-exam').classList.add('hidden');
            document.getElementById('st-result').classList.remove('hidden');
            document.getElementById('stScore').innerText = `${score}/${total}`;
        }
    </script>
</body>
</html>
